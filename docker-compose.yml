name: gdigital

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      # Persist the SQLite databases across restarts (they live in storage/).
      # Reset everything with: docker compose down -v
      - storage:/rails/storage
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/up"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 45s

volumes:
  storage:
